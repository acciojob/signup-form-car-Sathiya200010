<body>
	<form method ="post">
		<label for="name">Name</label>
		<input type="text" placeholder="Name" id="name" required><br><br>
		<label for="email">Email</label>
		<input type="email" placeholder="Email" id="email" required><br><br>

		<label for="gender_m">Male</label>

		<label for="gender_f">Female</label>
		<input type="radio" id="gender_f" name="gender" required><br><br>
		<label for ="cars">Select a car</label>
	<select placeholder= "--Please choose an option--" id="cars" required>
	
		<option>bmw</option>		
		<option>audi</option>
		<option>benz</option>
		</Select>
		<br><br>
		<label for="age">Age</label>

		<input type="Date" id="dob" required><br><br>
		<label for="tel">Phone Number</label>
		<input type="tel" id="tel" placeholder="xxx-xxx-xxxx"><br><br>
		<label for="password">Password</label>
		<input type ="password" id="password" placeholder="Password" required><br>
		<br>
		<label for="tos">I agree to the TOS</label>
		<input type="checkbox" id="tos" required><br><br>
		<button type="submit">Submit</button>
		

	</form>
